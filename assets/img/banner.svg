<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Finite element mesh banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b3b37"/>
      <stop offset="0.5" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#0b1f1d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <!-- Equilateral triangular FEM mesh -->
    <pattern id="mesh" width="100" height="86.6" patternUnits="userSpaceOnUse">
      <path d="M0,86.6 L50,0 L100,86.6 M0,0 L50,86.6 L100,0 M0,0 L100,0 M0,86.6 L100,86.6"
            fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
      <circle cx="0" cy="0" r="2" fill="#ffffff" fill-opacity="0.18"/>
      <circle cx="50" cy="86.6" r="2" fill="#ffffff" fill-opacity="0.18"/>
      <circle cx="100" cy="0" r="2" fill="#ffffff" fill-opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1600" height="420" fill="url(#bg)"/>
  <rect width="1600" height="420" fill="url(#mesh)"/>
  <rect width="1600" height="420" fill="url(#glow)"/>

  <!-- Faint governing equations of mechanics -->
  <g fill="#ffffff" fill-opacity="0.12" font-family="Georgia, 'Times New Roman', serif" font-style="italic">
    <text x="120" y="120" font-size="34">&#8711;&#183;&#963; + f = 0</text>
    <text x="1040" y="320" font-size="30">&#963; = C : &#949;</text>
    <text x="760" y="90" font-size="26">&#8747;&#8201;&#963;&#8201;d&#937;</text>
    <text x="300" y="360" font-size="26">Ku = F</text>
  </g>
</svg>
